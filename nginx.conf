worker_processes auto;
events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/html text/css text/javascript application/json;

    server {
        listen 3000 default_server;
        listen 80;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        # Extract subdomain slug from X-Forwarded-Host (set by Traefik).
        # e.g. X-Forwarded-Host: orizoeservices-co-za.rent-domains.com -> slug = orizoeservices-co-za
        set $slug "";
        if ($http_x_forwarded_host ~* "^([^.,]+)\.") {
            set $slug $1;
        }

        location / {
            try_files /$slug/index.html /index.html;
        }
    }
}
