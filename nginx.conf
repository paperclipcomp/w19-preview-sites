worker_processes auto;
events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/html text/css text/javascript application/json;

    # Route by subdomain: set root to the matching subdirectory.
    # $subdomain captures the first segment of *.rent-domains.com.
    # Using root variable is the reliable nginx pattern vs try_files with variables.
    server {
        listen 80;
        server_name ~^(?P<subdomain>[^.]+)\.rent-domains\.com$;

        root /usr/share/nginx/html/$subdomain;
        index index.html;

        add_header X-Site-Slug $subdomain always;

        location / {
            try_files $uri $uri/ /index.html =404;
        }
    }

    # Fallback / index listing for direct IP or bare domain access
    server {
        listen 80 default_server;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;
        add_header X-Handled-By "default-server" always;
        add_header X-Received-Host $http_host always;
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
