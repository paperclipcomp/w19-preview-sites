worker_processes auto;
events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/html text/css text/javascript application/json;

    server {
        listen 3000 default_server;
        listen 80;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        # Debug: expose what headers nginx receives from Traefik
        add_header X-Debug-Host $host always;
        add_header X-Debug-XFH $http_x_forwarded_host always;

        # Try X-Forwarded-Host first (Traefik sets this), fall back to $host
        set $slug "";
        if ($http_x_forwarded_host ~* "^([^.,]+)\.") {
            set $slug $1;
        }
        if ($slug = "") {
            if ($host ~* "^([^.,]+)\.") {
                set $slug $1;
            }
        }

        location / {
            try_files /$slug/index.html /index.html;
        }
    }
}
