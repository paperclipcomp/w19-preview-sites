worker_processes auto;
events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/html text/css text/javascript application/json;

    # Route by subdomain → subdirectory under /usr/share/nginx/html
    server {
        listen 80;
        server_name ~^(?P<subdomain>[^.]+)\.rent-domains\.com$;

        root /usr/share/nginx/html;
        index index.html;

        location / {
            try_files /$subdomain$uri /$subdomain/index.html =404;
        }
    }

    # Fallback / index listing for direct IP or bare domain access
    server {
        listen 80 default_server;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
